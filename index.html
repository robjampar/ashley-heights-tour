          // Check if it has gone off the right hand side
          let tooltip_width = tooltip.innerWidth();
          let tooltip_height = tooltip.innerHeight();
          let width = window.innerWidth;
          let height = window.innerHeight;
          if (left + tooltip_width > width) {
            top = position.top + 30;

            top = position.top - tooltip_height - 20;
          }

          // Get the correct tooltip
          tooltip.css("top", top.toFixed() + "px");
          tooltip.css("left", left.toFixed() + "px");
        });

        $(".tooltip_trigger").mouseleave(function() {

        function b64_to_utf8(b64) { return decodeURIComponent(escape(atob((b64 || "").replace(/\n/g, "")))); }

        // The token is held in memory only (never persisted to disk), so a
        // passcode is entered once per session. It can come from either the
        // embedded encrypted blob (auth.js -> window.__GH_ENC, unlocked by PIN)
        // or a manually pasted token.
        var runtimeToken = null;
        function get_token() { return runtimeToken || ""; }
        function set_token(t) { runtimeToken = t || null; }
        function clear_token() { runtimeToken = null; }

        // The GitHub token prefix is stripped before encryption (see
        // encrypt-setup.html) and re-added here, so the committed ciphertext
        // carries no give-away prefix.
        var TOKEN_PREFIX = "github_pat_";
        function b64_to_bytes(b64) {
          var bin = atob((b64 || "").replace(/\n/g, "")), u = new Uint8Array(bin.length);
          for (var i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i);
          return u;
        }
        // Derive an AES key from the passcode and decrypt the embedded token.
        // A wrong passcode fails the AES-GCM tag and rejects.
        function decrypt_token(pin) {
          var enc = window.__GH_ENC;
          var subtle = window.crypto && window.crypto.subtle;
          if (!enc) return Promise.reject(new Error("no embedded token"));
          if (!subtle) return Promise.reject(new Error("WebCrypto unavailable (needs https/localhost)"));
          var salt = b64_to_bytes(enc.salt), iv = b64_to_bytes(enc.iv), ct = b64_to_bytes(enc.ct);
          return subtle.importKey("raw", new TextEncoder().encode(pin), { name: "PBKDF2" }, false, ["deriveKey"])
            .then(function(km) {
              return subtle.deriveKey(
                { name: "PBKDF2", salt: salt, iterations: enc.iter || 600000, hash: "SHA-256" },
                km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
            })
            .then(function(key) { return subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ct); })
            .then(function(pt) {
              // Strip the fixed-length space/NUL padding, then re-add the prefix.
              return TOKEN_PREFIX + new TextDecoder().decode(pt).replace(/[\s␀]+$/g, "");
            });
        }

        function gh_headers(tok) {
          return { "Authorization": "Bearer " + tok, "Accept": "application/vnd.github+json",
                   "X-GitHub-Api-Version": "2022-11-28" };
        }
        function gh_get_json_file(path, tok) {
          return fetch(GH.api + "/repos/" + GH.owner + "/" + GH.repo + "/contents/" + path + "?ref=" + GH.branch,
            { headers: gh_headers(tok), cache: "no-store" })
            .then(function(r) {
              if (r.status === 404) return { sha: null, data: {} };
              if (!r.ok) return r.json().then(function(j){ throw mk_err(r.status, j); });
              return r.json().then(function(j) {
                var data = {};
                try { data = JSON.parse(b64_to_utf8(j.content)); } catch (e) {}
                return { sha: j.sha, data: data };
              });
            });
        }
        function gh_put(path, b64, message, tok, sha) {
          var body = { message: message, content: b64, branch: GH.branch };
          if (sha) body.sha = sha;
          return fetch(GH.api + "/repos/" + GH.owner + "/" + GH.repo + "/contents/" + path,
            { method: "PUT", headers: gh_headers(tok), body: JSON.stringify(body) })
            .then(function(r) { return r.json().then(function(j) { return { ok: r.ok, status: r.status, json: j }; }); });
        }
        function mk_err(status, j) {
          var e = new Error((j && j.message) ? j.message : ("HTTP " + status)); e.status = status; return e;
        }

        // Add version P for stem s to the committed manifest (read authoritative
        // branch content, prepend, PUT; retry once on a 409 sha race).
        function commit_manifest(s, P, tok) {
          function apply(cur) {
            var remote = cur.data || {};
            var entry = remote[s] || { versions: [] };
            entry.versions = entry.versions || [];
            entry.versions.forEach(function(v) { v.newest = false; });
            entry.versions.unshift({ url: P, label: human_ts(), newest: true });
            entry.active = P;
            remote[s] = entry;
            return { body: utf8_to_b64(JSON.stringify(remote, null, 2)), sha: cur.sha };
          }
          return gh_get_json_file("designs.json", tok).then(function(cur) {
            var m = apply(cur);
            return gh_put("designs.json", m.body, "Update designs manifest: " + s, tok, m.sha)
              .then(function(res) {
                if (res.status === 409) {
                  return gh_get_json_file("designs.json", tok).then(function(c2) {
                    var m2 = apply(c2);
                    return gh_put("designs.json", m2.body, "Update designs manifest: " + s + " (retry)", tok, m2.sha);
                  });
                }
                return res;
              })
              .then(function(res) {
                if (res.status === 401 || res.status === 403) { clear_token(); throw mk_err(res.status, res.json); }
                if (!res.ok) throw mk_err(res.status, res.json);
              });
          });
        }

        function do_upload(idx, s, f) {
          ensure_token().then(function(tok) {
            if (!tok) { set_status("Upload cancelled"); clear_status(3000); return; }
            set_status("Committing…");
            var ts = ts_now();
            var dir = png_path(ORIG[idx]).replace(/[^/]+$/, "");   // .../high/
            var P = dir + "design_history/" + s + "/" + ts + ".png";
            localOverride[P] = URL.createObjectURL(f);             // instant preview
            f.arrayBuffer().then(function(buf) {
              return gh_put(P, ab_to_b64(buf), "Add proposed render: " + (pics[idx].title || s) + " (" + ts + ")", tok);
            }).then(function(res) {
              if (res.status === 401 || res.status === 403) { clear_token(); throw mk_err(res.status, res.json); }
              if (!res.ok) throw mk_err(res.status, res.json);
              return commit_manifest(s, P, tok);
            }).then(function() {
              var entry = designs[s] || { versions: [] };
              entry.versions = entry.versions || [];
              entry.versions.forEach(function(v) { v.newest = false; });
              entry.versions.unshift({ url: P, label: human_ts(), newest: true });
              entry.active = P;
              designs[s] = entry;
              selected[s] = P;
              probed[s] = true;
              $ver.dataset.stem = "";        // force dropdown rebuild
              mode = "proposed";
              apply_mode(); update_seg(); sync_current(); refresh_panel();
              set_status("Published ✓ — live in ~1 min");
              clear_status(6000);
            }).catch(function(err) {
              delete localOverride[P];
              if (err && (err.status === 401 || err.status === 403)) set_status("Token rejected — set it again");
              else set_status("Upload failed: " + (err && err.message ? err.message : "error"));
              clear_status(5000);
              console.error("Design upload failed:", err);
            });
          });
        }

            m.querySelector("#dp-tm-clear").onclick = function() { clear_token(); input.value = ""; close(null); };

        // ---- Passcode modal (unlocks the embedded encrypted token) --------
        var pinModal = null, pinResolve = null;
        function open_pin_modal() {
          if (!pinModal) {
            var m = document.createElement("div");
            m.id = "dp-pin-modal";
            m.className = "dp-modal";
            m.innerHTML =
              "<div class='dp-tm-card'>" +
                "<div class='dp-tm-title'>Enter passcode to publish</div>" +
                "<div class='dp-tm-body'>Uploads commit to <b>" + GH.owner + "/" + GH.repo + "</b>. " +
                  "Enter the passcode to unlock publishing for this session.</div>" +
                "<input id='dp-pin-input' class='dp-tm-input' type='password' inputmode='numeric' " +
                  "placeholder='passcode' autocomplete='off' spellcheck='false'>" +
                "<div class='dp-tm-err' id='dp-pin-err'></div>" +
                "<div class='dp-tm-btns'>" +
                  "<button id='dp-pin-ok' class='dp-btn'>Unlock</button>" +
                  "<button id='dp-pin-forget' class='dp-btn'>Lock</button>" +
                  "<button id='dp-pin-cancel' class='dp-btn'>Cancel</button>" +
                "</div>" +
              "</div>";
            document.body.appendChild(m);
            m.addEventListener("mousedown", function(e) { e.stopPropagation(); });
            var input = m.querySelector("#dp-pin-input");
            var err = m.querySelector("#dp-pin-err");
            function close(val) { m.style.display = "none"; var r = pinResolve; pinResolve = null; if (r) r(val); }
            function attempt() {
              err.textContent = "Unlocking…";
              decrypt_token(input.value).then(function(tok) {
                set_token(tok); input.value = ""; err.textContent = ""; close(tok);
              }).catch(function(e) {
                err.textContent = (e && /WebCrypto/.test(e.message)) ? e.message : "Wrong passcode";
              });
            }
            m.querySelector("#dp-pin-ok").onclick = attempt;
            input.addEventListener("keydown", function(e) { if (e.key === "Enter") attempt(); });
            m.querySelector("#dp-pin-forget").onclick = function() { clear_token(); input.value = ""; err.textContent = "Locked."; };
            m.querySelector("#dp-pin-cancel").onclick = function() { close(null); };
            m.addEventListener("click", function(e) { if (e.target === m) close(null); });
            pinModal = m;
          }
          pinModal.querySelector("#dp-pin-err").textContent = "";
          pinModal.style.display = "flex";
          var self = pinModal;
          return new Promise(function(res) { pinResolve = res; setTimeout(function(){ self.querySelector("#dp-pin-input").focus(); }, 30); });
        }
        // Prefer the embedded encrypted token (unlock by passcode); otherwise
        // fall back to a manually pasted token.
        function ensure_token() {
          var t = get_token();
          if (t) return Promise.resolve(t);
          return window.__GH_ENC ? open_pin_modal() : open_token_modal();
        }

      // Find the floorplan from the id
      function locate_floorplan(floorplan_id) {

      let panIntervalId = null; // For smooth panning on keydown
      let stopIntervalId = null; // For gradual stop on keyup
      let deceleration = 0.1; // Deceleration factor
      let isPanning = false;
      let ctrl_down = false;

      // Keep track of key presses
      const key_tracker = {

        // Define the keycodes
        ctrl: 17,  
        left: 37,
        up: 38,
        right: 39,
        down: 40,
        cmd: 91,
        
        // Hold the current keys that are pressed
        ctrl_down: false,
        left_down: false, 
        right_down: false,
        up_down: false,
        down_down: false,
        cmd_down: false,

        // Get the key name from its code
        key_names: {
          17: 'ctrl',
          37: 'left',
          38: 'up',
          39: 'right',
          40: 'down',
          91: 'cmd'
        },

        // Set key down
        set_key_up_down: function(key_code, up_down) {

          // Make sure this is a valid key press
          if (!key_tracker.key_names[key_code]) {
            return;
          }
          
          // Set the value
          key_tracker[key_tracker.key_names[key_code] + '_down'] = up_down == 'down' ? true : false;
        },

        // Check if this is an arrow key
        is_arrow_key: function(keycode) {
          return key_tracker.is_up_down_key(keycode) || key_tracker.is_left_right_key(keycode);
        },

        // Check if this is an up or down key
        is_up_down_key: function(keycode) {
          return keycode == key_tracker.up || keycode == key_tracker.down;
        },

        // Check if this is a left or right key
        is_left_right_key: function(keycode) {
          return keycode == key_tracker.left || keycode == key_tracker.right;
        },

        // Check if this is a certain key
        is_key(keycode, key) {
          return key_tracker.key_names[keycode] == key;
        },

        // Release all keys
        release_all: function() {
          key_tracker.ctrl_down = false,
          key_tracker.left_down = false, 
          key_tracker.right_down = false,
          key_tracker.up_down = false
        }
      }

      // Helper function to clear both intervals
      function clearIntervals() {
        if (panIntervalId) {
          clearInterval(panIntervalId);
          panIntervalId = null;
        }
        if (stopIntervalId) {
          clearInterval(stopIntervalId);
          stopIntervalId = null;
        }
      }

      // Use the arrow keys to pan
      function pan_with_arrow_keys(keyCode, move_latitude) {
        
        // Get the current lat/lon
        let current_longitude = gallery.view.prop.longitude;
        let current_latitude = gallery.view.prop.latitude;

        gallery.view.stopAutorotate();
        
        clearIntervals();
        isPanning = true;
        let speed = key_tracker.is_key(keyCode, 'left') || key_tracker.is_key(keyCode, 'down') ? -Math.PI / 180 : Math.PI / 180;

        // Start smooth panning
        panIntervalId = setInterval(() => {
          if (move_latitude) {
            current_latitude = (current_latitude + speed) % (2 * Math.PI);
          } else {
            current_longitude = (current_longitude + speed) % (2 * Math.PI);
          }
          gallery.set_viewing_angle(current_longitude, current_latitude);
        }, 16);
      }

      // Arrow to next image (closest link)
      function arrow_key_next_image() {        
        let marker = gallery.get_closest_visible_link();
        if (marker != null && gallery.view.prop.loading_promise == null) {
          clearIntervals();
          isPanning = false;     
          gallery.load_scene(gallery.pictures.picture_index(marker.data.to));
          gallery.trigger_interaction();
        }
      }

      // Check for key down events
      $(document).keydown(function (event) {
        key_tracker.set_key_up_down(event.keyCode, 'down');
        
        // Check for up down movement
        if (key_tracker.is_up_down_key(event.keyCode) && (key_tracker.ctrl_down || key_tracker.cmd_down) && !isPanning) {
          pan_with_arrow_keys(event.keyCode, true);
        }

        // Pan the viewer when left/right pressed
        if (key_tracker.is_left_right_key(event.keyCode) && !isPanning) {
          // gallery.trigger_interaction(); CHECK WITH MARK!!!
          return pan_with_arrow_keys(event.keyCode);
        }

        // Move to the next image (use the closest link)
        if (key_tracker.up_down && !key_tracker.ctrl_down) {
          let current_longitude = gallery.view.prop.longitude;
          let current_latitude = gallery.view.prop.latitude;
          gallery.set_viewing_angle(current_longitude, current_latitude);
          arrow_key_next_image()
        }
      });

      // Check for key up events
      $(document).keyup(function (event) {

        let current_longitude = gallery.view.prop.longitude;
        let current_latitude = gallery.view.prop.latitude;

        // Smoothly stop panning
        let actioned_key = event.keyCode;
